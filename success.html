<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You! - Wed by Betty</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.08) 0%, rgba(139, 115, 85, 0.05) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .success-container {
            background: white;
            padding: 60px 50px;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
        }
        
        .checkmark {
            font-size: 5rem;
            color: #4CAF50;
            margin-bottom: 20px;
        }
        
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #2c2c2c;
        }
        
        p {
            font-size: 1.1rem;
            color: #666;
            line-height: 1.7;
            margin-bottom: 30px;
        }
        
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: #d4a574;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background: #b8895f;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="checkmark">✓</div>
        <h1>Thank You!</h1>
        <p>
            Your message has been sent successfully. Beatriz will get back to you within 24 hours.
        </p>
        <p>
            We're excited to help make your wedding day special!
        </p>
        <a href="/" class="btn">Back to Home</a>
    </div>
</body>
</html>
